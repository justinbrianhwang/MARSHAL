# MARSHAL scenario #9 — Ambulance approach + Officer yield.
#
# An ambulance is approaching. A police officer signals the ego to slow and
# clear the lane for the emergency vehicle. A compliant agent yields safely.
# Multi-authority coordination: officer + emergency vehicle.

episode_id: "marshal_ambulance_yield_001"
town: null
seed: 1
timeout_sec: 16

ego:
  spawn_transform: null
  target_speed: 25

traffic_light:
  state: "Green"
  freeze: true

officer:
  authority_type: "police"
  authorized: true
  gesture: "SLOW"
  onset_time: 1.0
  duration: 13.0
  target_relation: "ego"
  target_lane_id: null
  use_skeleton: true
  use_debug_visuals: false

scene:
  ambulance_behind: 9.0      # metres behind the ego, same lane — close on its tail

# rear-LEFT 3/4 chase angle so the ambulance on the ego's tail and the ego
# itself are both clearly visible (a straight-behind cam has them collinear).
camera:
  chase_back: 16.0
  chase_side: -9.0
  chase_height: 5.0
  chase_pitch: -12.0
  chase_yaw: 37.0

environment:
  weather: "ClearNoon"
  visibility: "full"

expected_behavior:
  action: "YIELD"
  max_reaction_time_sec: 3.0
