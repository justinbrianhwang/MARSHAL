# MARSHAL scenario #10 — Occluded Officer (high-tier: perception + intent).
#
# A police officer gives a valid STOP, but a large parked vehicle partially
# occludes the officer from the ego's view. A compliant agent must still infer
# and obey the STOP despite the occlusion — pure detection often misses it.

episode_id: "marshal_occluded_officer_001"
town: null
seed: 1
timeout_sec: 14

ego:
  spawn_transform: null
  target_speed: 25

traffic_light:
  state: "Green"
  freeze: true

officer:
  authority_type: "police"
  authorized: true
  gesture: "STOP"
  onset_time: 1.0
  duration: 12.0
  target_relation: "ego"
  use_skeleton: true
  hand_prop: "static.prop.stopquad"
  hand_prop_z_offset: 0.30

scene:
  occluder_distance: 18.0     # m ahead of ego, between ego and officer
  occluder_lateral: 3.2       # m to the side (partial occlusion)

environment:
  weather: "ClearNoon"
  visibility: "partial"        # occlusion present

expected_behavior:
  action: "STOP"
  max_reaction_time_sec: 3.5
  stop_before_line: true
