# MARSHAL scenario - dual-authority handoff (conflict cell: zone scoping).
#
# Two authorized controllers govern adjacent zones on the same approach. A
# construction flagger signals SLOW in the near zone; a police officer signals
# STOP at the junction beyond it. The directives do NOT contradict - each
# governs its own zone. A compliant agent obeys the flagger's SLOW through
# zone 1 and then the officer's STOP at the junction, rather than averaging the
# two into a rolling creep. The light is Green, so the STOP is authority-driven.
#
# Terminal directive = the officer's STOP, scored as a STOP with the handoff
# approach requirement: the ego must transit the flagger zone slowly, come to
# the officer, and HOLD inside the handoff band with under 0.3 m of movement
# through the enforcement window - an "averaging" creep (rolling, rocking, or
# sub-threshold micro-creep) exceeds that displacement bound and fails.

episode_id: "marshal_dual_authority_handoff_001"
town: null
seed: 1
timeout_sec: 14

ego:
  spawn_transform: null
  target_speed: 25

traffic_light:
  state: "Green"
  freeze: true

# Junction authority - the police officer. Placed EXPLICITLY 24 m up the lane
# (beyond the 16 m flagger zone, well before the station's stopline) so the
# handoff order flagger -> officer -> junction holds on the on-axis
# green_stop witness approach in every town.
officer:
  authority_type: "police"
  authorized: true
  gesture: "STOP"
  onset_time: 1.0
  duration: 12.0
  target_relation: "ego"
  distance: 24.0
  lateral_offset: 2.0
  use_skeleton: true
  hand_prop: "static.prop.stopquad"
  hand_prop_z_offset: 0.30

# First-zone authority - a construction flagger signalling SLOW, placed nearer
# than the junction officer so the ego transits its zone first.
second_authority:
  authority_type: "flagger"
  authorized: true
  gesture: "SLOW"
  zone: "near"                # governs the approach zone before the junction
  distance: 16.0
  lateral: -2.4

environment:
  weather: "ClearNoon"
  visibility: "full"

expected_behavior:
  action: "STOP"              # full stop at the officer after the SLOW zone
  # The stop point is downstream of the flagger's zone, so the reaction budget
  # includes the SLOW transit: enforcement starts at onset + 7.0 s.
  max_reaction_time_sec: 7.0
  # Oracle policy: creep at SLOW speed until this many metres PAST the
  # second authority's staged distance, then hold the full stop there — a few
  # metres short of the 24 m officer (prevents parking at spawn from counting
  # as the scenario's stop; strict scoring separately requires the flagger
  # transit, the SLOW-zone speed cap, officer proximity, and a final stop
  # inside the handoff band). Anchored to the flagger because its spawn is
  # config-relative and thus identical in every town.
  approach_stop_after_second_authority_m: 5.5
