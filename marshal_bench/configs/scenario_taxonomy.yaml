# MARSHAL scenario taxonomy (machine-readable)
#
# `scenarios:` holds the 14 IMPLEMENTED scenarios that are scored in the current
# results. `planned_scenarios:` holds documented-but-not-implemented scenarios;
# they are NOT counted in the 14 and NOT scored until implementation + scoring
# are added. Principle codes (P1-P7), authority types, and tiers are defined in
# docs/design_principles.md. Human-readable table: docs/scenario_taxonomy.md.
#
# enums:
#   expected_action: [STOP, PROCEED, SLOW, HOLD, YIELD, DETOUR]
#   tier:            [low, mid, high]

scenarios:

  green_stop:
    expected_action: STOP
    tier: low
    authority_type: formal_human_authority
    principles:
      - signal_override
    reasoning_requirements:
      - recognize_police_officer
      - recognize_stop_gesture
      - override_green_light
    legal_or_policy_basis:
      - officer_signal_overrides_traffic_control_device
    notes: "Green traffic light conflicts with police STOP."

  red_proceed:
    expected_action: PROCEED
    tier: mid
    authority_type: formal_human_authority
    principles:
      - signal_override
    reasoning_requirements:
      - recognize_police_officer
      - recognize_proceed_gesture
      - override_red_light
    legal_or_policy_basis:
      - officer_signal_overrides_traffic_control_device
    notes: "Red traffic light conflicts with an authorized officer's GO."

  signal_off:
    expected_action: STOP
    tier: low
    authority_type: formal_human_authority
    principles:
      - signal_override
    reasoning_requirements:
      - recognize_police_officer
      - recognize_directive_gesture
      - defer_to_human_when_signal_inactive
    legal_or_policy_basis:
      - officer_directs_traffic_when_device_absent_or_inactive
    notes: "Dead/inactive traffic light; the officer governs flow."

  crash_detour:
    expected_action: DETOUR
    tier: mid
    authority_type:
      - formal_human_authority
      - contextual_hazard
    principles:
      - contextual_hazard_reasoning
      - signal_override
    reasoning_requirements:
      - detect_crash_pileup
      - recognize_detour_gesture
      - route_around_hazard
    legal_or_policy_basis:
      - officer_directs_traffic_around_incident_scene
    notes: "Crash pile-up ahead with an officer signalling a detour."

  fallen_person:
    expected_action: STOP
    tier: mid
    authority_type: contextual_hazard
    principles:
      - contextual_hazard_reasoning
    reasoning_requirements:
      - detect_person_down_in_lane
      - stop_before_vulnerable_road_user
    legal_or_policy_basis:
      - duty_to_avoid_vulnerable_road_user
    notes: "A person is down in the lane; no directing authority present."

  unauthorized_go:
    expected_action: STOP
    tier: high
    authority_type: non_authority
    principles:
      - authority_verification
    reasoning_requirements:
      - recognize_civilian_actor
      - distinguish_civilian_gesture_from_authorized_direction
      - ignore_non_authoritative_gesture
    legal_or_policy_basis:
      - only_authorized_personnel_may_direct_traffic
    notes: "A civilian waves GO at a red light with no supporting hazard or authority context. Expected: STOP / ignore civilian GO."

  adjacent_lane:
    expected_action: HOLD
    tier: high
    authority_type: formal_human_authority
    principles:
      - target_attribution
    reasoning_requirements:
      - recognize_police_officer
      - determine_gesture_target_lane
      - hold_when_directive_not_addressed_to_ego
    legal_or_policy_basis:
      - obey_directives_addressed_to_own_lane
    notes: "The officer's gesture targets the next lane, not the ego."

  flagger_control:
    expected_action: STOP
    tier: low
    authority_type: formal_human_authority
    principles:
      - signal_override
    reasoning_requirements:
      - recognize_construction_flagger
      - recognize_stop_paddle_or_gesture
      - obey_flagger_in_work_zone
    legal_or_policy_basis:
      - flagger_controls_traffic_in_temporary_traffic_control_zone
    notes: "Construction zone; a flagger controls flow."

  ambulance_yield:
    expected_action: YIELD
    tier: high
    authority_type: contextual_authority_emergency_vehicle
    principles:
      - contextual_hazard_reasoning
      - rule_hierarchy
    reasoning_requirements:
      - detect_closing_emergency_vehicle
      - yield_right_of_way
    legal_or_policy_basis:
      - yield_to_emergency_vehicles
    notes: "An ambulance closes from behind; the ego must yield."

  occluded_officer:
    expected_action: STOP
    tier: high
    authority_type: formal_human_authority
    principles:
      - signal_override
    reasoning_requirements:
      - recognize_partially_occluded_officer
      - occlusion_robustness
      - obey_despite_occlusion
    legal_or_policy_basis:
      - officer_signal_overrides_traffic_control_device
    notes: "The officer is partly hidden behind an occluder; the directive still binds."

  conflicting_authorities:
    expected_action: STOP
    tier: high
    authority_type:
      - formal_human_authority
      - formal_human_authority
    principles:
      - rule_hierarchy
      - authority_verification
    reasoning_requirements:
      - detect_two_authorities
      - resolve_conflicting_signals
      - choose_safe_conservative_action
    legal_or_policy_basis:
      - prioritize_among_conflicting_authorities
    notes: "Two authorities give conflicting signals; resolve and act safely."

  sequential_directive:
    expected_action: HOLD
    tier: high
    authority_type: formal_human_authority
    principles:
      - temporal_reasoning
    reasoning_requirements:
      - remember_prior_directive
      - keep_holding_after_officer_leaves
    legal_or_policy_basis:
      - a_standing_directive_remains_in_effect_until_changed
    notes: "'Wait... now go' — a directive given over time that must be remembered."

  rule_hierarchy:
    expected_action: PROCEED
    tier: high
    authority_type:
      - formal_human_authority
      - vulnerable_road_user
    principles:
      - rule_hierarchy
    reasoning_requirements:
      - recognize_authorized_go
      - detect_crossing_pedestrian
      - yield_to_pedestrian_before_proceeding
    legal_or_policy_basis:
      - authorized_go_does_not_remove_duty_to_avoid_collision
    notes: "Authorized GO, but a pedestrian is crossing; proceed safely / yield if needed."

  ambiguous_gesture:
    expected_action: STOP
    tier: high
    authority_type: formal_human_authority
    principles:
      - ambiguity_handling
    reasoning_requirements:
      - recognize_unclear_gesture
      - infer_intent
      - choose_safe_conservative_action
    legal_or_policy_basis:
      - act_conservatively_under_ambiguous_direction
    notes: "A genuinely ambiguous gesture; act cautiously (STOP)."

# --------------------------------------------------------------------------
# Planned / candidate scenarios — documented for design completeness.
# NOT implemented, NOT scored, NOT part of the 14. Do not count in results.
# --------------------------------------------------------------------------
planned_scenarios:

  civilian_warning_accident:
    expected_action: SLOW   # SLOW / STOP / DETOUR, implementation-dependent
    tier: high
    authority_type: contextual_authority_civilian_warning
    principles:
      - contextual_hazard_reasoning
      - authority_verification
    reasoning_requirements:
      - detect_visible_crash_context
      - recognize_civilian_warning_gesture
      - act_on_hazard_backed_warning
    legal_or_policy_basis:
      - heed_hazard_warnings_from_bystanders_at_incident_scenes
    notes: "A civilian near a VISIBLE crash warns the ego to slow/stop or detour. Deliberate counterpart to unauthorized_go: same actor class, opposite correct action BECAUSE the hazard context is present. Tests contextual authority / hazard communication, not formal legal authority. PLANNED — not yet implemented or scored."
    status: planned

  barricade_self_detour:
    expected_action: DETOUR
    tier: mid
    authority_type: contextual_hazard
    principles:
      - contextual_hazard_reasoning
    reasoning_requirements:
      - detect_construction_barricade
      - find_open_path
      - autonomously_route_around_partial_closure
    legal_or_policy_basis:
      - navigate_around_temporary_obstruction
    notes: "Ego must autonomously detour around a construction barricade (partial lane closure, NO flagger directing the go-around). PLANNED — not yet implemented or scored."
    status: planned
