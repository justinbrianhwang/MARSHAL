# MARSHAL temporal flagger scenario: SLOW, then STOP.
#
# A construction flagger controls a roadworks lane closure. The traffic light is
# pinned Green, but the formal flagger directive changes over time and the final
# expected behavior is STOP.

episode_id: "marshal_flagger_slow_then_stop_001"
town: null
seed: 1
timeout_sec: 16

ego:
  spawn_transform: null
  target_speed: 25

traffic_light:
  state: "Green"
  freeze: true

officer:
  authority_type: "flagger"
  authorized: true
  gesture: "SLOW"
  onset_time: 1.0
  duration: 5.0
  target_relation: "ego"
  target_lane_id: null
  use_skeleton: true
  use_debug_visuals: false
  hand_prop: "static.prop.stopquad"
  hand_prop_z_offset: 0.30
  # blueprint_id left null -> default walker; swap to a worker mesh later.

scene:
  construction_block: 30.0
  switch_to_stop_time: 6.0
  stop_duration: 10.0

environment:
  weather: "ClearNoon"
  visibility: "full"

expected_behavior:
  action: "STOP"
  max_reaction_time_sec: 3.0
  stop_before_line: true
