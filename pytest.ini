[pytest]
# Keep pytest's scratch space inside the repo. The shared %TEMP%\pytest-of-<user>
# directory (and .pytest_cache) can be left behind with restricted ACLs by
# sandboxed tool runs on Windows, which then breaks tmp_path-based tests with
# PermissionError. A project-local basetemp + no cacheprovider avoids both.
addopts = --basetemp=.pytest_tmp -p no:cacheprovider
